# Phase W.4 — playbook mode constants sourced from YAML (no hardcoded names in code).
#
# The three lists below drive runtime gating across the engine. Historically
# they lived as literal Python lists inside `backend/engines/risk_engine.py`
# and `backend/engines/execution/phase3b_execution.py`. Extracting them here
# makes operational changes (add/remove a playbook) editable without code diff.
#
# Safety: `backend/engines/modes_loader.py` falls back to hardcoded defaults
# (mirroring this file) if parsing fails, so a broken YAML never crashes boot.
#
# Order matters for logging readability only. AGGRESSIVE_ALLOWLIST / DENYLIST
# are used by `risk_engine.py`; PHASE3B_PLAYBOOKS by `phase3b_execution.py`.

