# Aplus_04_v2 alpha'' — Family B (HTF_15m_BOS) avec schema alpha''.
# Derive directement de Aplus_04_HTF_15m_BOS_v1 (Option B). SEULES differences :
#   take_profit_logic.tp_logic        : absent (fixed_rr implicit) -> "liquidity_draw"
#   take_profit_logic.tp_logic_params : absent -> {draw_type=swing_k3, lookback_bars=60,
#                                                   min_rr_floor=0.5, fallback_rr=2.0,
#                                                   pool_selection=significant,
#                                                   max_rr_ceiling=3.0}
#   context_requirements.require_structure_alignment : absent -> "k3"
# require_htf_alignment=D, require_close_above_trigger=true, entry_buffer_bps=2.0 INCHANGES.
# max_duration_minutes=60, setup_tf=15m, entry LIMIT fvg_retest, SL SWING recent_swing INCHANGES.
#
# Hypothese testee : le schema alpha'' (significant k3 + ceiling 3.0 + EC + structure k3)
# debloque-t-il un edge sur Family B (HTF+15m BOS) comme le framework Case A/B/C l'exige
# pour un 2eme data point convergent ? Case A -> schema porte l'edge, justifie Aplus_01
# Family A full. Case B -> sous-exerce, itererait finement. Case C -> signal 15m BOS
# ne suffit pas non plus -> 2 data points convergents -> bear ferme sur le schema
# tel qu'implemente, pivot vers Family A full (Aplus_01 sweep+IFVG+breaker).
- playbook_name: Aplus_04_HTF_15m_BOS_v1
  category: DAYTRADE
  description: "Aplus_04 v2 alpha'': Family B (HTF+15m BOS) avec tp_logic=liquidity_draw significant k3 + structure_alignment k3. 2e data point sur le schema."
  max_setups_per_session: 3
  enabled_in_modes:
  - AGGRESSIVE
  instruments:
  - SPY
  - QQQ
  timefilters:
    session: NY
    time_range:
    - 09:30
    - '12:00'
  context_requirements:
    htf_bias_allowed:
    - bullish
    - bearish
    day_type_allowed:
    - trend
    - manipulation_reversal
    structure_htf:
    - uptrend
    - downtrend
    london_sweep_required: false
    adx_min: null
    require_structure_alignment: k3
  triggers:
  - type: ICT
    ict_pattern: bos
    direction: with_bias
    min_quality: 0.3
  conditions:
    require_sweep: true
    require_bos: true
    allow_fvg: true
    require_fvg: false
    pattern_confirmations: 1
    volatility_min: null
    volatility_max: null
  ict_confluences:
    require_sweep: true
    allow_fvg: true
    require_bos: true
    smt_bonus: false
  candlestick_patterns:
    required_families: []
    direction: with_bias
  entry_logic:
    type: LIMIT
    zone: fvg_retest
    confirmation_tf: 1m
  setup_tf: 15m
  stop_loss_logic:
    type: SWING
    distance: recent_swing
    padding_ticks: 3
  take_profit_logic:
    min_rr: 1.0
    tp1_rr: 1.0
    tp2_rr: 2.0
    breakeven_at_rr: 0.5
    trailing_mode: trail_rr
    trailing_trigger_rr: 0.7
    trailing_offset_rr: 0.3
    tp_logic: liquidity_draw
    tp_logic_params:
      draw_type: swing_k3
      lookback_bars: 60
      min_rr_floor: 0.5
      fallback_rr: 2.0
      pool_selection: significant
      max_rr_ceiling: 3.0
  scoring:
    weights:
      bos_strength: 0.3
      liquidity_sweep: 0.25
      fvg_quality: 0.2
      pattern_quality: 0.1
      context_strength: 0.15
    grade_thresholds:
      A_plus: 0.8
      A: 0.65
      B: 0.5
  max_duration_minutes: 60
  require_htf_alignment: D
  require_close_above_trigger: true
  entry_buffer_bps: 2.0
