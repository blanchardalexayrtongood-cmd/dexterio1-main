# DexterioBOT - Playbooks DAYTRADE & SCALPING
# Univers : ICT / TJR / Alex + Patterns Chandelles
# Structure : context → triggers → entry/SL/TP → scoring

# ============================================================================
# PLAYBOOKS DAYTRADE (6)
# ============================================================================

- playbook_name: "NY_Open_Reversal"
  category: "DAYTRADE"
  description: "Reversal à l'ouverture NY après sweep de liquidité London"
  max_setups_per_session: 2

  enabled_in_modes:
    - "SAFE"
    - "AGGRESSIVE"

  instruments:
    - "SPY"
    - "QQQ"
  
  timefilters:
    session: "NY"
    time_range: ["09:30", "11:00"]
  
  context_requirements:
    htf_bias_allowed: ["bullish", "bearish"]
    day_type_allowed: ["trend", "manipulation_reversal"]
    structure_htf: ["uptrend", "downtrend"]
    london_sweep_required: true
    volatility_min: null
    volatility_max: null
  
  ict_confluences:
    require_sweep: true
    allow_fvg: true
    require_bos: false
    smt_bonus: true
  
  candlestick_patterns:
    required_families:
      - "engulfing"
      - "pin_bar"
      - "morning_star"
      - "evening_star"
    direction: "contrarian"
  
  entry_logic:
    type: "LIMIT"
    zone: "pattern_close"
    confirmation_tf: "1m"
  setup_tf: "5m"

  stop_loss_logic:
    type: "SWING"
    distance: "recent_swing"
    padding_ticks: 1

  take_profit_logic:
    min_rr: 3.0
    tp1_rr: 3.0
    tp2_rr: 5.0
    breakeven_at_rr: 1.0

  scoring:
    weights:
      liquidity_sweep: 0.15
      pattern_quality: 0.30
      fvg_alignment: 0.25
      bos_strength: 0.15
      context_strength: 0.15
    grade_thresholds:
      A_plus: 0.80
      A: 0.65
      B: 0.50

