bloc3_structural:
  subsections:
    - heading: "Catégorie audit (§18.3 v4)"
      body: |
        **STRUCTURAL_KILL** via gate FAIL convergent sur 2 variantes (sober + control). Pas FANTASY (vraie implémentation funding harvest classique : long spot + short perp = market-neutral, collect funding payments). Pas PARTIAL_IMPL (briques fetch + backtest + cost model en place). L'edge crypto basis 2024-2025 est compressé sous le PASS bar 8%.
    - heading: "Lecture structurelle — pourquoi 5.5% APR ne fait pas un edge actionnable"
      body: |
        Le market crypto basis a été massivement arbitré post-2022 :

        - **2021-2022 bull mania** : funding APR moyen 25-50% (retail FOMO long perp, crypto natives short hedge)
        - **2023-2024 normalization** : APR descend 10-20% (institutional capture progressif via DeFi yield farms, MicroStrategy-style basis trades, Grayscale basis arb)
        - **2024-2025 saturation** : APR moyen 5-7% sur 2y mesuré (BTC 5.46%, ETH 5.72% gross). Edge résiduel = compensation marginale pour risques structurels.

        À 5.5% APR net, comparé aux risques :
        - Counterparty Binance (FTX 2022 reminder)
        - Basis blowout sur événement extrême (March 2020 COVID, May 2021 China ban, FTX collapse)
        - Regulatory risk (US/EU restrictions sur exchanges)
        - Funding rate régime change abrupt

        Le ratio reward/risk est **inférieur** à TLT yield + dividend (~4.5% APR sans risk crypto). Crypto basis n'est plus un edge actionnable pour capital propre 2024-2025.
    - heading: "Variante 1 over-trading destructive"
      body: |
        Strategy "exit après 2 consecutive negative funding" déclenche 153 round-trips combinés sur 2y. À 0.16% per rotation = 24% costs annualisés total, qui dépassent le gross funding (~5.5%). Net APR -0.25%.

        L'optimisation naive "réagir au funding negative" est contre-productive parce que les fluctuations 8h sont noisier que la tendance. Continuous hold (variante 2) est la version optimale. Mais même celle-ci FAIL le PASS bar 8%.
    - heading: "Convergence cross-tests (15e data point négatif)"
      body: |
        Pattern complet par classe d'edge testée sur DexterioBOT :

        - **ICT canon-faithful (post-§0.B)** : 3/3 fail (SMT inconclusive, Aplus_01_v2 dilué, HTF_Bias_15m_BOS_v2 archived)
        - **Momentum daily long-only** : 2/2 fail permutation (J&T cross-sectional p=0.558, TSMOM per-asset p=0.880)
        - **Directional intraday continuation** : 1/1 fail kill rules (Flag breakout 3 kill rules convergents)
        - **Crypto basis/funding harvest** : 1/1 fail gate 8% (5.51% best variante)

        **15 data points négatifs cross-classes**. Le périmètre testé (data free + intraday/daily liquide US + crypto basis 2y) est entièrement saturé.
    - heading: "Hypothèse alternatives non testées"
      body: |
        - **Funding harvest régime-conditional** : enter only when funding > 10% APR threshold (filter top quintile). Pourrait améliorer net APR mais réduirait time-in-market. Non-testé per discipline plan (pas de grid search post-FAIL).
        - **Cross-exchange basis arb** : Binance perp vs OKX/Bybit perp avec different funding rates. Requires multi-exchange infra, hors scope J6-J7.
        - **DeFi yield farming** (Aave/Compound + Curve) : APR plus élevé mais smart contract risk + gaz fees. Hors scope (pas crypto pivot fundamental).

bloc4_decision:
  body: |
    **Crypto basis/funding harvest v1 = ARCHIVED** par discipline plan v4.0 J7.

    Gate PASS bar 8% FAIL sur 2 variantes convergentes. Variante 1 (sober exit-on-neg) déclenche kill rule (-0.25%). Variante 2 (continuous control) marginalement OK kill rule mais FAIL PASS bar (5.51% < 8%).

    Edge réel mesuré ~5.5% APR sur 2024-2025 ne compense pas les risques crypto (counterparty, basis blowout, regulatory). Le market basis a été arbitré professionnellement post-2022.

    **Pivot Priorité #3 plan v4.0 J7 — Aplus_01_v2 single-filter last-call** déclenché immédiatement.

bloc5_why:
  subsections:
    - heading: "Pas de funding-threshold filter post-hoc"
      body: |
        Plan v4.0 explicite : pas de single-filter retest post-FAIL = grid search caché. Si filtre threshold était dans hypothèse initiale OK, mais post-test = p-hacking.
    - heading: "Pas de cross-exchange ou DeFi extension"
      body: |
        Hors scope J6-J7 (2 jours). Demande infra nouvelle (Binance + OKX + Bybit auth, gas fees DeFi). Si user veut explorer crypto sérieusement futur, séparé Sprint dédié post-décision globale.
    - heading: "Honnêteté méthodologique"
      body: |
        Variante 2 continuous hold = best naive case. Test hypothèse fondamentale du funding harvest (collect funding × time × notional). 5.51% APR est la **vérité empirique** du marché 2024-2025. Pas tuning, pas selection bias.
    - heading: "Convergence post-15-data-points = signal stratégique fort"
      body: |
        Toutes les classes d'edge testées (ICT canon, momentum daily, directional intraday, crypto basis) FAIL sur SPY/QQQ/BTC/ETH 2019-2026. Pattern univoque : edges publics gratuits sur instruments liquides US/crypto majeurs sont arbitrés. Confirme hypothèse "outcome B" empiriquement à 15 points.

