bloc3_structural:
  subsections:
    - heading: "Asymétrie buyer/seller validée empiriquement"
      body: |
        98.8% des trades reconciled sont strictement worse (vs 100% pré-G3 par construction du `next_bar.open` adverse). Les 2 trades positifs (1 aug_w3 +$112, 1 nov_w4 +$77) reflètent des cas où `next_bar.open` était structurellement favorable au-delà de l'adverse spread — cohérent, pas un bug.
    - heading: "Variance per-week 0.0787 → 0.1031 (Δ +0.024)"
      body: |
        oct_w2 = best week (mean_delta_R = -0.079), aug_w3/jun_w3 = worst (-0.103). Reflète probablement la distribution des `next_bar.open` gaps (jun_w3 inclut early-summer macro events ; oct_w2 plus calme). Variance acceptable (4 weeks dans une bande [-0.078, -0.103]) → spread 1 bp est **directionnellement homogène** sur le corpus.
    - heading: "Stress 2 bps moins destructeur que prévu sur oct_w2 (−0.093 vs +1bp -0.079, Δ +0.014)"
      body: |
        Doublement du spread n'augmente pas linéairement le delta_R parce que `extra_slippage_pct` (5 bps = 0.05%) reste dominant. Spread 1 bp = +20% vs slippage seul ; spread 2 bps = +40%. Cohérent avec total_pct = 0.0005 + 0.0001 = 0.0006 (G3 1bp) vs 0.0005 + 0.0002 = 0.0007 (G3 2bps), soit ratio 1.20 → 1.40.
    - heading: "Implication §0.5bis entrée #1 Aplus_01 Family A v2 TRUE HTF"
      body: |
        Tout playbook qui veut atteindre `E[R]_net > 0.10R` (Stage 2 PASS bar §10) doit produire `E[R]_pre_reconcile > 0.197R/trade` (0.10 + 0.097 budget). Ce seuil est **brutal** vs les data points historiques Legs 1-4.2 (max E[R]_gross historique ≈ +0.025 sur Engulfing baseline 4w M, jamais > 0.05R). Doctrine §0.6.0 substitution s'applique : le bar Stage 2 inclut budget reconcile complet.
    - heading: "Cas non-couvert v1 (différé)"
      body: |
        `spread_bps` est constant (1 bp SPY/QQQ). Pas de modélisation des sessions illiquides (premarket/post 16:00 ET, lunch 12:00-13:30) où spread réel SPY peut être 2-3× wider. Pour §0.5bis entrée #1 (Family A v2 sweep 1h/4h) le spread RTH est l'hypothèse correcte. Si entrée #4 Flags 15m ou entrée #3 Avellaneda-Lee multi-ETF active, re-évaluer (IWM/EFA/EEM ont spreads structurellement >2 bps).

bloc4_decision:
  body: |
    **G3 = DONE**. Budget slippage `E[R]_pre_reconcile` → `E[R]_net` quantifié à **−0.097R/trade** (4-week aggregate calib_corpus_v1, 170 trades). Cette valeur **remplace** le `-0.065R/trade` historique référencé dans §5.3 / §18.3 verdicts antérieurs. Tous les verdicts post-G3 doivent citer ce nouveau budget pour la conversion `E[R]_pre_reconcile` → `E[R]_net` sur SPY/QQQ intraday RTH.

bloc5_why:
  subsections:
    - heading: "Pas de tuning du spread"
      body: |
        1 bp = valeur SPY/QQQ liquidity-tier 1 documentée (cf market microstructure literature, Hendershott et al. 2011, average effective spread S&P 500 large caps ~0.5-1.5 bps RTH). Aucun fitting sur le corpus.
    - heading: "Pas de calibration `extra_slippage_pct`"
      body: |
        Conservé à 5 bps (0.0005) pré-G3 pour éviter de modifier 2 axes en même temps. Si Sprint 4 paper IBKR fournit calibration empirique, `IBKRLatency` (post-G2) + `extra_slippage_pct` calibré pourraient remplacer.
    - heading: "Test stress 2 bps inclus"
      body: |
        Valider que le modèle est linéaire en spread (ratio adverse 1.20 vs 1.40 cohérent) — pas de pathologie cachée.
    - heading: "Reconcile harness, pas re-run mini_lab_week"
      body: |
        Fidèle à la directive user "pas de long run tant qu'on est pas dans le vert" (cf [feedback_no_long_runs.md](.claude/projects/-home-dexter-dexterio1-main/memory/feedback_no_long_runs.md)). Budget slippage est mesurable à partir des trades existants ; re-run smoke avec `ConservativeFillModel(spread_bps=1.0)` viendra à G4 (verdict templating) ou §0.5bis entrée #1.
    - heading: "Gate pré-backlog 3/4 DONE, 1 PENDING"
      body: |
        G1 + G2 + G3 livrés. Reste **G4 verdict templating** (`build_verdict.py`) avant §0.5bis entrée #1.

