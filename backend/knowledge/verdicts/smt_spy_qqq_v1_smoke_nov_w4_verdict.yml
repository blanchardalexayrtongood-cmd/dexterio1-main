bloc5_why:
  body: |
    La décision SMOKE_INCONCLUSIVE n'est pas un échec ni un succès — c'est le
    résultat attendu per dossier §18 pièce H et §20 grille 4-cas.

    **Pourquoi pas ARCHIVED** : n=0 ne réfute pas l'hypothèse formelle
    (§18 pièce B risque principal = "n ≥ 15 + E[R]_pre_reconcile ≤ 0.05R"
    — jamais atteint). Per §0.2 #13 Implementation faithfulness et règle
    §18.4 "Mélange hypothèse / infrastructure = interdit", on doit
    distinguer "signal rare structurellement" (Cas A/B) de "signal réfuté"
    (Cas C). À n=0 on est explicitly Cas A1.

    **Pourquoi pas PROMOTE vers Stage 2** : gate Stage 1 canonique exige
    n ≥ 15 + E[R]_pre_reconcile > 0.05R + peak_R p60 > 0.5R + 0 weeks
    < -0.5R. Aucune métrique observable avec n=0.

    **Pourquoi élargir corpus avant tuning** : règle §18.4 anti-dérive
    "Calibrations infinies = fit l'histoire". Tuner `pre_sweep_window`
    ou `htf_bias_allowed` sans données sur le point de blocage =
    pre-optimisation aveugle.

    **Plan d'action next session** :
    1. Ajouter instrumentation lightweight dans `_run_smt_pair_tick` et
       `SMTDriver.on_5m_bar` : compteurs persistés dans `debug_counts`
       (pair_tick_fired / pool_sweeped / structure_observable /
       signal_detected / macro_gate_passed / bias_gate_passed /
       profile_gate_passed / pre_sweep_gate_passed / emit_setup).
    2. Re-smoke nov_w4 avec instrumentation → localiser point de blocage :
       - pair_tick_fired = 0 → bug pair-coord (both_5m_closed jamais
         synchrone)
       - pool_sweeped = 0 → HTF sweep genuinely rare (expected Cas A1)
       - signal_detected = 0 mais POOL_SWEEPED > 0 → divergence rare (ok)
       - emit_setup = 0 mais signal_detected > 0 → gate cascade bloquant,
         alors itération ciblée justifiée
    3. **Run 4w canonical** post-instrumentation (jun_w3 + aug_w3 + oct_w2
       + nov_w4) realistic fill → Stage 1 gate decision.

    **Cross-check §0.3 point 3bis A/B hypothesis** : ne se déclenche qu'après
    **≥3 playbooks canon-faithful post-§0.B testés en Stage 1**. Ici on est
    encore à 0 Stage 1 complete (Stage 1 = 4w, pas 1-week smoke). §0.3 point
    3bis pas applicable avant 4w Stage 1 de SMT + Aplus_01 v2 + HTF_Bias_15m_BOS v2.

